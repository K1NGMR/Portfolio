      name: "&cNo Plot Found"
      lore:
        - "&7You must be standing inside a plot cell"
        - "&7to manage it."
    plot-info:
      name: "&6Plot Information"
      lore:
        - "&ePlot ID: &f{id}"
        - "&ePlot Name: &f{name}"
        - "&eOwner: &f{owner}"
        - "&eTrusted Members: &f{trusted}"
        - "&eAdded Members: &f{added}"
        - "&eActive Flags: &f{flags}"
    plot-flags:
      name: "&bPlot Flags"
      lore:
        - "&7Toggle PVP, flight, explosions, time, etc."
    change-biome:
      name: "&dChange Biome"
      lore:
        - "&7Change the environmental biome of this plot."
    reset-plot:
      name: "&cReset/Delete Plot"
      lore:
        - "&7Clear all structures or unclaim this plot."
