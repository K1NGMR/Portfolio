# SimplePlots Database Storage Settings
# Choose between SQLite (file-based) or MySQL (server-based).

storage-type: "sqlite" # "sqlite" or "mysql"

sqlite:
  file-name: "plots.db"

mysql:
  host: "localhost"
  port: 3306
  database: "simpleplots"
  username: "root"
  password: ""
  pool:
    maximum-pool-size: 10
    minimum-idle: 2
    connection-timeout: 30000
    idle-timeout: 600000
    max-lifetime: 1800000
