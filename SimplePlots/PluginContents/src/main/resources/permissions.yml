# Permissions Configuration for SimplePlots
# You can define custom permission nodes required for each subcommand.
# Set a subcommand's permission to 'false' (boolean or string) to require no permission.
# If a permission node is specified, players must have that permission (or plots.admin) to use it.

commands:
  help: "false"
  gui: "plots.use"
  menu: "plots.use"
  claim: "plots.claim"
  auto: "plots.auto"
  info: "plots.info"
  add: "plots.add"
  remove: "plots.remove"
  trust: "plots.trust"
  untrust: "plots.trust"
  deny: "plots.deny"
  undeny: "plots.deny"
  flag: "plots.flag"
  biome: "plots.biome"
  merge: "plots.merge"
  unlink: "plots.unlink"
  unmerge: "plots.unlink"
  clear: "plots.clear"
  delete: "plots.delete"
  unclaim: "plots.delete"
  chat: "plots.chat"
  backup: "plots.backup"
  download: "plots.download"
  delete-download: "plots.download"
  transfer: "plots.transfer"
  visit: "plots.visit"
  home: "plots.home"
  sethome: "plots.sethome"
  near: "plots.near"
  stats: "plots.stats"
  rate: "plots.rate"
  comments: "plots.comments"
  copy: "plots.copy"
  paste: "plots.paste"
  middle: "plots.middle"
  block: "plots.block"
  unblock: "plots.unblock"
  joinsupportdc: "plots.joinsupportdc"
  chest: "false"
  admin: "plots.admin"
  setup: "plots.admin"
  condense: "plots.admin"
  trim: "plots.admin"
  database: "plots.admin"
  worldtp: "plots.admin"
  setowner: "plots.admin"
  reload: "plots.admin"
  massunclaim: "plots.admin"
